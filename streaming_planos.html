<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlix - Planos</title>
    <link rel="stylesheet" href="streaming_global.css">
    
    <style>
        .planos-container {
            display: flex; justify-content: center; gap: 30px; padding: 40px 20px; flex-wrap: wrap; margin-top: 100px;
        }
        .card-plano {
            background-color: var(--fundo-cartao); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 40px; width: 320px; text-align: center;
            box-shadow: var(--sombra-suave); transition: 0.3s;
        }
        .card-plano:hover {
            transform: translateY(-10px); border-color: var(--cor-destaque);
            box-shadow: 0 12px 40px rgba(229, 9, 20, 0.2);
        }
        .card-plano h3 { font-size: 28px; margin-bottom: 15px; color: var(--cor-destaque); }
        .preco { font-size: 38px; font-weight: 800; margin-bottom: 20px; }
        .btn-assinar {
            display: inline-block; background-color: var(--cor-destaque); color: white;
            padding: 15px 30px; border-radius: 50px; font-weight: bold; margin-top: 25px;
            cursor: pointer; border: none; font-size: 16px; transition: 0.2s; width: 100%;
        }
        .btn-assinar:hover { background-color: #b20710; transform: scale(1.05); }
    </style>
</head>
<body>
    <header class="navbar">
        <h1 class="logo">DevFlix</h1>
        <nav>
            <a href="streaming_index.html">Início</a>
            <a href="streaming_planos.html">Planos</a>
            <a href="streaming_cadastro.html">Cadastrar</a>
            <a href="streaming_login.html" class="btn-login">Entrar</a>
        </nav>
    </header>

    <main>
        <div class="planos-container">
            <div class="card-plano">
                <h3>Plano Padrão</h3>
                <p class="preco">R$ 21,90</p>
                <p style="color: #aaa; margin-bottom: 10px;">2 Telas simultâneas</p>
                <p style="color: #aaa;">Resolução 1080p Full HD</p>
                <button class="btn-assinar" onclick="assinarPlano('Plano Padrão')">Escolher Padrão</button>
            </div>
            <div class="card-plano">
                <h3>Plano Premium</h3>
                <p class="preco">R$ 45,90</p>
                <p style="color: #aaa; margin-bottom: 10px;">4 Telas simultâneas</p>
                <p style="color: #aaa;">Resolução 4K + HDR</p>
                <button class="btn-assinar" onclick="assinarPlano('Plano Premium')">Escolher Premium</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Projeto Escolar - Plataforma de Streaming &copy; 2026</p>
    </footer>

    <script>
        function assinarPlano(nomeDoPlano) {
            alert("✅ Sucesso! Aquisição concluída.\n\nVocê acaba de assinar o " + nomeDoPlano + ". Prepare a pipoca e seja bem-vindo à DevFlix!");
            window.location.href = "streaming_index.html"; 
        }
    </script>
</body>
</html>
