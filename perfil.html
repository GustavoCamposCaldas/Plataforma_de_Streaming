<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlix - Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-perfil">
    <header class="navbar">
        <h1 class="logo">DevFlix</h1>
        <nav>
            <a href="index.html#logado">Início</a>
            <a href="planos.html">Planos</a>
            <div class="nav-user">
                <a href="perfil.html" class="user-profile-link">
                    <div class="user-avatar user-avatar-display">U</div>
                    <span class="user-name-display">Meu Perfil</span>
                </a>
                <a href="index.html" class="btn-sair">Sair</a>
            </div>
            <div class="nav-auth">
                <a href="cadastro.html">Cadastrar</a>
                <a href="login.html" class="btn-login">Entrar</a>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        <div class="login-box">
            <h2 style="text-align: center; margin-bottom: 30px;">Meu Perfil</h2>
            
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 30px;">
                <div class="user-avatar user-avatar-display" style="width: 80px; height: 80px; font-size: 32px; margin-bottom: 10px;">U</div>
                <a href="#" style="font-size: 14px; color: var(--cor-destaque); font-weight: 600;">Alterar Foto</a>
            </div>

            <form>
                <div class="input-grupo">
                    <label>Nome Completo</label>
                    <input type="text" id="input-nome" value="Usuário DevFlix">
                </div>
                <div class="input-grupo">
                    <label>Email</label>
                    <input type="email" id="input-email" value="usuario@devflix.com">
                </div>
                <div class="input-grupo">
                    <label>Senha Atual</label>
                    <input type="password" placeholder="Digite sua senha para confirmar">
                </div>
                <a href="#perfil-salvo" onclick="salvarPerfil()" class="btn-submit" style="display: block; text-align: center;">Salvar Alterações</a>
            </form>
            <a href="index.html#logado" style="display: block; text-align: center; margin-top: 25px; font-size: 14px; color: var(--texto-secundario);">Voltar para o catálogo</a>
        </div>
    </main>

    <footer>
        <p>Projeto Escolar - Plataforma de Streaming &copy; 2026</p>
    </footer>

    <div id="perfil-salvo" class="modal-perfil-sucesso">
        <div class="modal-perfil-sucesso-card">
            <h2>💾 Alterações Salvas!</h2>
            <p>Seus dados foram atualizados com sucesso no sistema.</p>
            <a href="#" class="btn-login btn-fechar-perfil">Continuar Editando</a>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const nomeSalvo = localStorage.getItem('devflix_nome');
            const emailSalvo = localStorage.getItem('devflix_email');

            if (nomeSalvo) {
                document.getElementById('input-nome').value = nomeSalvo;
                document.querySelectorAll('.user-name-display').forEach(el => el.innerText = nomeSalvo);
                document.querySelectorAll('.user-avatar-display').forEach(el => el.innerText = nomeSalvo.charAt(0).toUpperCase());
            }
            if (emailSalvo) {
                document.getElementById('input-email').value = emailSalvo;
            }
        });

        function salvarPerfil() {
            const novoNome = document.getElementById('input-nome').value;
            const novoEmail = document.getElementById('input-email').value;

            localStorage.setItem('devflix_nome', novoNome);
            localStorage.setItem('devflix_email', novoEmail);

            document.querySelectorAll('.user-name-display').forEach(el => el.innerText = novoNome);
            document.querySelectorAll('.user-avatar-display').forEach(el => el.innerText = novoNome.charAt(0).toUpperCase());
        }
    </script>
</body>
</html>
