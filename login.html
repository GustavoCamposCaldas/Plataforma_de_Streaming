<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlix - Entrar</title>
    
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <h1 class="logo">DevFlix</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="planos.html">Planos</a>
            <div class="nav-user">
                <a href="perfil.html" class="user-profile-link">
                    <div class="user-avatar user-avatar-display">U</div>
                    <span class="user-name-display">Meu Perfil</span>
                </a>
                <a href="index.html" class="btn-sair">Sair</a>
            </div>
            <div class="nav-auth">
                <a href="cadastro.html">Cadastrar</a>
                <a href="login.html" class="btn-login">Entrar</a>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        <div class="login-box">
            <h2>Entrar</h2>
            <form id="form-login">
                <div class="input-grupo">
                    <label>Email ou Usuário</label>
                    <input type="email" required>
                </div>
                <div class="input-grupo">
                    <label>Senha</label>
                    <input type="password" required>
                </div>
                <a href="index.html#login-sucesso" class="btn-submit" style="display: block; text-align: center;">Entrar</a>
            </form>
            <p style="margin-top: 20px; text-align: center; font-size: 14px; color: #aaa;">
                Novo por aqui? <a href="cadastro.html" style="color: var(--cor-destaque);">Cadastre-se agora</a>
            </p>
        </div>
    </main>
    <footer>
        <p>Projeto Escolar - Plataforma de Streaming &copy; 2026</p>
    </footer>
</body>
</html>
