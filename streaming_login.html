<!DOCTYPE html>
<html lang="pt-BR">

    <title>Streaming - Entrar</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header class="navbar">
        <h1 class="logo">DevFlix</h1>
        <nav>
            <a href="streaming_index.html">Início</a>
            <a href="streaming_planos.html">Planos</a>
            <a href="streaming_login.html" class="btn-login">Entrar</a>

    <main style="display: flex; justify-content: center; align-items: center; flex: 1; padding: 40px 20px;">
        <div class="login-box">
            <h2>Entrar</h2>
            <form>
                <div class="input-grupo">
                    <label>Email ou Usuário</label>
                    <input type="email" required>
                </div>
                <div class="input-grupo">
                    <label>Senha</label>
                    <input type="password" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
        </div>
    </main>

    <footer>
        <p>Projeto Escolar - Plataforma de Streaming &copy; 2026</p>
    </footer>
