<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlix - Cadastrar</title>
    <link rel="stylesheet" href="streaming_global.css">
    <link rel="stylesheet" href="streaming_auth.css">
</head>
<body>
    <header class="navbar">
        <h1 class="logo">DevFlix</h1>
        <nav>
            <a href="streaming_index.html">Início</a>
            <a href="streaming_planos.html">Planos</a>
            <a href="streaming_cadastro.html">Cadastrar</a>
            <a href="streaming_login.html" class="btn-login">Entrar</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="login-box">
            <h2>Criar Conta</h2>
            <form onsubmit="realizarCadastro(event)">
                <div class="input-grupo">
                    <label>Nome Completo</label>
                    <input type="text" required>
                </div>
                <div class="input-grupo">
                    <label>Email</label>
                    <input type="email" required>
                </div>
                <div class="input-grupo">
                    <label>Senha</label>
                    <input type="password" required>
                </div>
                <button type="submit" class="btn-submit">Finalizar Cadastro</button>
            </form>
            <p style="margin-top: 20px; text-align: center; font-size: 14px; color: #aaa;">
                Já tem conta? <a href="streaming_login.html" style="color: var(--cor-destaque);">Entre aqui</a>
            </p>
        </div>
    </main>

    <footer>
        <p>Projeto Escolar - Plataforma de Streaming &copy; 2026</p>
    </footer>

    <script>
        function realizarCadastro(event) {
            event.preventDefault(); 
            alert("🎉 Cadastro realizado com sucesso!\n\nAgora você já pode fazer login.");
            window.location.href = "streaming_login.html"; 
        }
    </script>
</body>
</html>
